name: red-team

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install pytest
      - name: Unit tests
        run: python -m pytest -q
      - name: Red-team gate (hardened target must not leak)
        run: python -m redteam.run --target hardened --threshold 1.0 --report report.md
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report
          path: report.md
